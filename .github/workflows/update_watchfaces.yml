name: Update Watch Faces JSON

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  # Allows you to trigger the run manually from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install google-play-scraper

      - name: Run Scraper Script
        run: node scraper.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add watchfaces.json
          
          # Only commit if there are actual changes to the JSON file
          if git diff-index --quiet HEAD; then
            echo "No changes in watch faces data to commit."
          else
            git commit -m "chore: auto-update watchfaces.json data"
            git pull --rebase origin master
            git push
          fi
